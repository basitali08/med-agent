name: med_agent
description: MED AGENT — multi-agent, privacy-aware health decision-support app.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  http: ^1.2.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  fl_chart: ^0.68.0
  glassmorphism: ^3.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  rive: ^0.13.0
  flutter_svg: ^2.0.0
  geolocator: ^13.0.1
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-semibold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-bold.ttf
          weight: 700
